<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Logo box -->
  <rect x="480" y="120" width="100" height="100" rx="22" fill="url(#orange)"/>
  <text x="530" y="192" font-family="Arial Black, Arial" font-size="52" font-weight="900" fill="white" text-anchor="middle">CL</text>
  <!-- Title -->
  <text x="600" y="310" font-family="Arial Black, Arial" font-size="58" font-weight="900" fill="white" text-anchor="middle">CampusLink KE</text>
  <!-- Subtitle -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">Meet People in Kenya</text>
  <!-- Tag line -->
  <rect x="350" y="430" width="500" height="54" rx="27" fill="url(#orange)"/>
  <text x="600" y="465" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">Connect · Chat · Find Your Match</text>
  <!-- URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="22" fill="#475569" text-anchor="middle">campuslink.co.ke</text>
</svg>
